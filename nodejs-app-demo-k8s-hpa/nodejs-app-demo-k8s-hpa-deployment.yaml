apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: nodejs-app-demo-k8s-hpa
  name: nodejs-app-demo-k8s-hpa-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nodejs-app-demo-k8s-hpa
  template:
    metadata:
      labels:
        app: nodejs-app-demo-k8s-hpa
      name: nodejs-app-demo-k8s-hpa
    spec:
      # imagePullSecrets:
      #   - name: sample-docker-secret
      containers:
        - image: sdubey321/nodejs-app-demo-k8s-hpa:1.0.0
          name: nodejs-app-demo-k8s-hpa
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nodejs-app-demo-k8s-hpa-configmap2
          env:
            - name: DB_PASSWORD_NODE_DEMO
              valueFrom:
                secretKeyRef:
                  key: password
                  name: nodejs-app-demo-k8s-hpa-secret
            - name: KEY1
              valueFrom:
                secretKeyRef:
                  key: key1
                  name: nodejs-app-demo-k8s-hpa-secret
            - name: KEY2
              valueFrom:
                secretKeyRef:
                  key: key2
                  name: nodejs-app-demo-k8s-hpa-secret
          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "200m"
